<!DOCTYPE html>
<html lang="lv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Graphify – Atver uzdevumu</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #F8F9FF;
      color: #2D3748;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #ffffff;
      border-radius: 20px;
      padding: 40px 32px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(108, 99, 255, 0.10);
    }

    .logo {
      font-size: 36px;
      font-weight: 800;
      color: #6C63FF;
      margin-bottom: 6px;
    }

    .tagline {
      font-size: 14px;
      color: #718096;
      margin-bottom: 32px;
    }

    /* Opening state */
    #state-opening { display: block; }
    #state-fallback { display: none; }

    .spinner {
      width: 44px;
      height: 44px;
      border: 4px solid #E2E8F0;
      border-top-color: #6C63FF;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .status-text {
      font-size: 17px;
      font-weight: 600;
      color: #2D3748;
      margin-bottom: 8px;
    }

    .status-sub {
      font-size: 14px;
      color: #718096;
    }

    /* Fallback state */
    .fallback-icon {
      font-size: 52px;
      margin-bottom: 16px;
    }

    .fallback-title {
      font-size: 20px;
      font-weight: 700;
      color: #2D3748;
      margin-bottom: 8px;
    }

    .fallback-body {
      font-size: 14px;
      color: #718096;
      line-height: 1.6;
      margin-bottom: 28px;
    }

    .store-buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .store-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 14px 20px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      transition: opacity 0.15s;
    }

    .store-btn:hover { opacity: 0.85; }

    .store-btn-ios {
      background: #000000;
      color: #ffffff;
    }

    .store-btn-android {
      background: #01875F;
      color: #ffffff;
    }

    .store-btn-icon {
      font-size: 20px;
      line-height: 1;
    }

    .retry-link {
      display: inline-block;
      margin-top: 20px;
      font-size: 13px;
      color: #6C63FF;
      cursor: pointer;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Graphify</div>
    <div class="tagline">Atzīmē kļūdas grafā</div>

    <!-- State 1: trying to open the app -->
    <div id="state-opening">
      <div class="spinner"></div>
      <p class="status-text">Atver lietotni…</p>
      <p class="status-sub">Ja nekas nenotiek, lietotne, iespējams, nav instalēta.</p>
    </div>

    <!-- State 2: app did not open -->
    <div id="state-fallback">
      <div class="fallback-icon">📱</div>
      <p class="fallback-title">Lejupielādē Graphify</p>
      <p class="fallback-body">
        Lai atvērtu šo uzdevumu, instalē <strong>Graphify</strong> savā ierīcē
        un pēc tam atver saiti vēlreiz.
      </p>
      <div class="store-buttons">
        <a
          class="store-btn store-btn-android"
          href="https://play.google.com/store/apps/details?id=com.raffikss.Graphify"
          target="_blank"
          rel="noopener"
        >
          <span class="store-btn-icon"></span>
          Lejupielādēt lietotni
        </a>
      </div>
      <span class="retry-link" onclick="tryOpen()">Man jau ir lietotne – mēģināt vēlreiz</span>
    </div>
  </div>

  <script>
    var FALLBACK_DELAY_MS = 2200;
    var exerciseId = new URLSearchParams(window.location.search).get('exerciseId');
    var deepLink   = exerciseId
      ? 'graphifyapp://guest-solve?exerciseId=' + encodeURIComponent(exerciseId)
      : 'graphifyapp://';

    var fallbackTimer = null;

    function showFallback() {
      document.getElementById('state-opening').style.display = 'none';
      document.getElementById('state-fallback').style.display = 'block';
    }

    function tryOpen() {
      document.getElementById('state-opening').style.display = 'block';
      document.getElementById('state-fallback').style.display = 'none';

      clearTimeout(fallbackTimer);
      window.location.href = deepLink;

      fallbackTimer = setTimeout(function () {
        if (!document.hidden) showFallback();
      }, FALLBACK_DELAY_MS);
    }

    document.addEventListener('visibilitychange', function () {
      if (document.hidden) clearTimeout(fallbackTimer);
    });

    tryOpen();
  </script>
</body>
</html>
